name: Manual Build and Release

on:
  workflow_dispatch: 
    inputs:
      tag_name:
        description: 'Tag name for the release'
        required: true
        default: 'manual-build'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'pnpm'

      - name: Install dependencies
        # Reverting to the original working install command
        run: pnpm install --frozen-lockfile

      - name: Determine Version
        id: versioning
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=$PKG_VERSION" >> $GITHUB_OUTPUT
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          echo "release_tag=${{ github.event.inputs.tag_name }}-$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Build and Package
        env:
          RELEASE_VERSION: ${{ steps.versioning.outputs.pkg_version }}
        run: pnpm run zip

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.release_tag }}
          name: "Manual Build: ${{ steps.versioning.outputs.pkg_version }}"
          body: "Manually triggered build of Gemini Chat Extension."
          draft: false
          prerelease: false
          files: .output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
